<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Force VR | AP Physics Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060c1a; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
    canvas { display: block; }

    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── LEFT PANEL ── */
    #left-panel {
      position: absolute; top: 24px; left: 24px;
      pointer-events: none;
    }
    .sim-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 24px; font-weight: 700;
      letter-spacing: 5px; color: #00ffcc;
      text-shadow: 0 0 20px rgba(0,255,204,0.5);
    }
    .sim-subtitle {
      font-size: 10px; letter-spacing: 3px;
      color: #1a3a4a; margin-bottom: 18px;
      text-transform: uppercase;
    }
    .stat-row { display: flex; gap: 8px; line-height: 2.0; font-size: 13px; }
    .stat-label { color: #2a5060; }
    .stat-value { color: #d0fff8; }
    .stat-accent { color: #ffaa00; }
    .stat-pos { color: #00ffcc; }
    .stat-neg { color: #ff3366; }

    /* ── RIGHT PANEL ── */
    #right-panel {
      position: absolute; top: 24px; right: 24px;
      text-align: right; font-size: 13px;
      pointer-events: none;
    }
    .panel-head {
      font-size: 10px; letter-spacing: 3px;
      color: #1a3a4a; margin-bottom: 10px;
    }
    .eq-line {
      color: #1a3a4a; font-size: 11px;
      letter-spacing: 1px; margin-top: 4px;
    }

    /* ── VR BUTTON ── */
    #vr-button {
      position: absolute; bottom: 32px;
      left: 50%; transform: translateX(-50%);
      pointer-events: all;
      padding: 13px 40px;
      background: transparent;
      border: 1.5px solid #00ffcc;
      color: #00ffcc;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px; letter-spacing: 4px;
      cursor: pointer; border-radius: 2px;
      text-transform: uppercase;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #vr-button:hover:not(:disabled) {
      background: rgba(0,255,204,0.08);
      box-shadow: 0 0 40px rgba(0,255,204,0.25), inset 0 0 20px rgba(0,255,204,0.05);
    }
    #vr-button:disabled { opacity: 0.3; cursor: default; border-color: #336655; color: #336655; }

    /* ── DESKTOP HINT ── */
    #hint {
      position: absolute; bottom: 90px;
      left: 50%; transform: translateX(-50%);
      color: #1a3040; font-size: 11px;
      letter-spacing: 1.5px; white-space: nowrap;
      text-align: center;
    }

    /* ── CHARGE BADGE ── */
    #charge-badge {
      position: absolute; bottom: 90px; left: 24px;
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid #00ffcc;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
      color: #00ffcc;
      box-shadow: 0 0 20px rgba(0,255,204,0.3);
      transition: all 0.3s;
    }
    #charge-badge.neg {
      border-color: #ff3366; color: #ff3366;
      box-shadow: 0 0 20px rgba(255,51,102,0.3);
    }
    #charge-label {
      position: absolute; bottom: 78px; left: 80px;
      font-size: 11px; letter-spacing: 2px; color: #2a5060;
    }
  </style>
</head>
<body>

<div id="overlay">
  <!-- Left panel -->
  <div id="left-panel">
    <div class="sim-title">MAGNETIC FORCE VR</div>
    <div class="sim-subtitle">AP Physics C &nbsp;·&nbsp; Lorentz Force Laboratory</div>

    <div class="stat-row">
      <span class="stat-label">B FIELD&nbsp;&nbsp;</span>
      <span class="stat-accent" id="b-val">2.0 T</span>
      <span class="stat-label">&nbsp;[</span>
      <span class="stat-value" id="b-dir">+Z</span>
      <span class="stat-label">]</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">PARTICLES&nbsp;</span>
      <span class="stat-value" id="p-count">0</span>
    </div>
  </div>

  <!-- Right panel -->
  <div id="right-panel">
    <div class="panel-head">LATEST PARTICLE</div>
    <div class="stat-row" style="justify-content:flex-end;">
      <span class="stat-label">SPEED&nbsp;&nbsp;</span>
      <span class="stat-value" id="v-val">—</span>
    </div>
    <div class="stat-row" style="justify-content:flex-end;">
      <span class="stat-label">RADIUS&nbsp;</span>
      <span class="stat-value" id="r-val">—</span>
    </div>
    <div class="stat-row" style="justify-content:flex-end;">
      <span class="stat-label">PERIOD&nbsp;</span>
      <span class="stat-value" id="T-val">—</span>
    </div>
    <div class="eq-line">r = mv / |q|B</div>
    <div class="eq-line">T = 2πm / |q|B</div>
  </div>

  <!-- Charge badge -->
  <div id="charge-badge" title="Press Q to flip charge">+</div>
  <div id="charge-label">CHARGE · Q TO FLIP</div>

  <!-- VR Enter button -->
  <button id="vr-button">CHECKING VR…</button>

  <!-- Desktop hint -->
  <div id="hint">
    CLICK / SPACE = fire &nbsp;·&nbsp; ↑↓ = B strength &nbsp;·&nbsp; ←→ = B direction &nbsp;·&nbsp; Q = flip charge &nbsp;·&nbsp; drag = orbit
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ════════════════════════════════════════════════
// PALETTE & CONSTANTS
// ════════════════════════════════════════════════
const PAL = {
  bg:       0x060c1a,
  cyan:     0x00ffcc,
  amber:    0xffaa00,
  red:      0xff3366,
  blue:     0x1133bb,
  gridLine: 0x0a1e2e,
  wallLine: 0x0b1c2c,
};

const PARTICLE_MASS   = 1.0;
const PARTICLE_CHARGE = 1.0;
const MAX_PARTICLES   = 25;
const TRAIL_LEN       = 120;
const PARTICLE_LIFE   = 20;   // seconds before auto-removal
const LAUNCH_SPEED    = 5.5;  // m/s default

// B-field preset directions
const B_PRESETS = [
  { vec: new THREE.Vector3( 0,  0,  1), label: '+Z', desc: 'into screen' },
  { vec: new THREE.Vector3( 0,  0, -1), label: '-Z', desc: 'out of screen' },
  { vec: new THREE.Vector3( 0,  1,  0), label: '+Y', desc: 'upward' },
  { vec: new THREE.Vector3( 0, -1,  0), label: '-Y', desc: 'downward' },
  { vec: new THREE.Vector3( 1,  0,  0), label: '+X', desc: 'rightward' },
  { vec: new THREE.Vector3(-1,  0,  0), label: '-X', desc: 'leftward' },
];

// ════════════════════════════════════════════════
// SIMULATION STATE
// ════════════════════════════════════════════════
let bDirIdx    = 0;
let bMag       = 2.0;
let chargeSign = 1;
let particles  = [];
let xrSession  = null;
let lastTime   = 0;

function getB() {
  return B_PRESETS[bDirIdx].vec.clone().multiplyScalar(bMag);
}

// ════════════════════════════════════════════════
// RENDERER
// ════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(PAL.bg, 1);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(PAL.bg, 0.035);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 80);
camera.position.set(0, 1.6, 5);
scene.add(camera); // needed so VR HUD follows headset

// ════════════════════════════════════════════════
// LIGHTING
// ════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x102030, 1.5));
const mainLight = new THREE.PointLight(0x00ffcc, 0.7, 30);
mainLight.position.set(0, 6, 0);
scene.add(mainLight);
const fillLight = new THREE.PointLight(0xffaa00, 0.25, 20);
fillLight.position.set(-6, 2, -4);
scene.add(fillLight);

// ════════════════════════════════════════════════
// ENVIRONMENT
// ════════════════════════════════════════════════
// Floor grid
const gridHelper = new THREE.GridHelper(26, 52, PAL.gridLine, PAL.gridLine);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

const floorGeo = new THREE.PlaneGeometry(26, 26);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x030810, roughness: 1 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// Room wireframe
const roomEdges = new THREE.EdgesGeometry(new THREE.BoxGeometry(20, 10, 20));
const roomLines = new THREE.LineSegments(roomEdges,
  new THREE.LineBasicMaterial({ color: PAL.wallLine, transparent: true, opacity: 0.5 })
);
roomLines.position.y = 5;
scene.add(roomLines);

// Corner accent dots
[-9, 9].forEach(x => [-9, 9].forEach(z => {
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.04),
    new THREE.MeshBasicMaterial({ color: PAL.cyan })
  );
  dot.position.set(x, 0.02, z);
  scene.add(dot);
}));

// ════════════════════════════════════════════════
// B-FIELD ARROW VISUALIZATION
// ════════════════════════════════════════════════
const arrowGroup = new THREE.Group();
scene.add(arrowGroup);
let arrowList = [];

function buildArrow() {
  const g = new THREE.Group();
  const shaftGeo = new THREE.CylinderGeometry(0.011, 0.011, 0.30, 6);
  const headGeo  = new THREE.ConeGeometry(0.036, 0.14, 6);
  const mat = new THREE.MeshStandardMaterial({
    color: PAL.blue, emissive: PAL.blue, emissiveIntensity: 0.55,
    transparent: true, opacity: 0.70, roughness: 0.3, metalness: 0.1,
  });
  const shaft = new THREE.Mesh(shaftGeo, mat);
  const head  = new THREE.Mesh(headGeo, mat.clone());
  head.position.y = 0.22;
  g.add(shaft, head);
  return g;
}

function populateArrows() {
  while (arrowGroup.children.length) arrowGroup.remove(arrowGroup.children[0]);
  arrowList = [];

  const spacing = 1.5;
  const nx = 7, ny = 4, nz = 7;
  const ox = -(nx - 1) * spacing / 2;
  const oy = 0.45;
  const oz = -(nz - 1) * spacing / 2;

  for (let ix = 0; ix < nx; ix++) {
    for (let iy = 0; iy < ny; iy++) {
      for (let iz = 0; iz < nz; iz++) {
        const arrow = buildArrow();
        arrow.position.set(ox + ix * spacing, oy + iy * spacing, oz + iz * spacing);
        arrowGroup.add(arrow);
        arrowList.push(arrow);
      }
    }
  }
}
populateArrows();

const _defaultUp = new THREE.Vector3(0, 1, 0);

function refreshArrows() {
  const dir = B_PRESETS[bDirIdx].vec;
  const t   = Math.min(bMag / 5, 1);
  const col = new THREE.Color().lerpColors(
    new THREE.Color(0x112299),
    new THREE.Color(0x00ddff),
    t
  );
  const q = new THREE.Quaternion().setFromUnitVectors(_defaultUp, dir);
  const scale = Math.min(0.55 + bMag * 0.12, 1.5);

  for (const arrow of arrowList) {
    arrow.setRotationFromQuaternion(q);
    arrow.scale.setScalar(scale);
    for (const child of arrow.children) {
      child.material.color.set(col);
      child.material.emissive.set(col);
    }
  }
}
refreshArrows();

// ════════════════════════════════════════════════
// VR FLOATING HUD (canvas texture, child of camera)
// ════════════════════════════════════════════════
let vrHUD = null;

function makeVRHUD() {
  const cnv = document.createElement('canvas');
  cnv.width = 540; cnv.height = 340;
  const ctx = cnv.getContext('2d');
  const tex = new THREE.CanvasTexture(cnv);

  const panel = new THREE.Mesh(
    new THREE.PlaneGeometry(0.72, 0.45),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthTest: false })
  );
  // Position: lower-right of headset view
  panel.position.set(0.32, -0.20, -0.62);
  camera.add(panel);

  vrHUD = { panel, ctx, cnv, tex };
}

function removeVRHUD() {
  if (!vrHUD) return;
  camera.remove(vrHUD.panel);
  vrHUD.panel.geometry.dispose();
  vrHUD.panel.material.dispose();
  vrHUD = null;
}

function drawVRHUD() {
  if (!vrHUD) return;
  const { ctx, cnv, tex } = vrHUD;
  const W = cnv.width, H = cnv.height;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(3, 9, 22, 0.93)';
  ctx.fillRect(0, 0, W, H);

  // Border
  ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, W - 2, H - 2);
  ctx.strokeStyle = '#001f30'; ctx.lineWidth = 1;
  ctx.strokeRect(7, 7, W - 14, H - 14);

  // Title
  ctx.font = 'bold 700 19px Rajdhani, monospace';
  ctx.fillStyle = '#00ffcc';
  ctx.fillText('MAGNETIC FORCE VR', 20, 36);
  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.fillStyle = '#1a3a4a';
  ctx.fillText('AP PHYSICS C  ·  LORENTZ FORCE LAB', 20, 53);

  // Divider
  ctx.strokeStyle = '#001a2a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(18, 63); ctx.lineTo(W - 18, 63); ctx.stroke();

  function row(label, value, y, valColor = '#d0fff8') {
    ctx.font = '15px "Share Tech Mono", monospace';
    ctx.fillStyle = '#2a5060';
    ctx.fillText(label, 20, y);
    ctx.fillStyle = valColor;
    ctx.fillText(value, 200, y);
  }

  row('B FIELD',    `${bMag.toFixed(1)} T  [${B_PRESETS[bDirIdx].label}]`, 86, '#ffaa00');
  row('CHARGE',     chargeSign > 0 ? '+1 e' : '−1 e', 110, chargeSign > 0 ? '#00ffcc' : '#ff3366');
  row('PARTICLES',  `${particles.length} / ${MAX_PARTICLES}`, 134);

  ctx.strokeStyle = '#001a2a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(18, 148); ctx.lineTo(W - 18, 148); ctx.stroke();

  if (particles.length > 0) {
    const p   = particles[particles.length - 1];
    const spd = p.velocity.length();
    const r   = bMag > 0.01 ? (PARTICLE_MASS * spd / (PARTICLE_CHARGE * bMag)).toFixed(2) + ' m' : '—';
    const T   = bMag > 0.01 ? (2 * Math.PI * PARTICLE_MASS / (PARTICLE_CHARGE * bMag)).toFixed(2) + ' s' : '—';
    row('SPEED',  spd.toFixed(2) + ' m/s', 172);
    row('RADIUS', r, 196, '#00ffcc');
    row('PERIOD', T, 220);
  } else {
    ctx.font = '13px "Share Tech Mono", monospace';
    ctx.fillStyle = '#1a3040';
    ctx.fillText('fire a particle to see live data', 20, 190);
  }

  ctx.strokeStyle = '#001a2a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(18, 235); ctx.lineTo(W - 18, 235); ctx.stroke();

  ctx.font = '12px "Share Tech Mono", monospace';
  ctx.fillStyle = '#1e3a4a';
  ctx.fillText('R.TRIGGER  fire particle', 20, 255);
  ctx.fillText('R.GRIP     B strength ↑', 20, 272);
  ctx.fillText('L.TRIGGER  cycle B direction', 20, 289);
  ctx.fillText('L.GRIP     B strength ↓', 20, 306);

  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.fillStyle = '#1a3040';
  ctx.fillText('r = mv / |q|B', 330, 272);
  ctx.fillText('T = 2πm / |q|B', 330, 289);

  tex.needsUpdate = true;
}

// ════════════════════════════════════════════════
// PARTICLE SYSTEM
// ════════════════════════════════════════════════
function spawnParticle(position, velocity, charge) {
  if (particles.length >= MAX_PARTICLES) {
    disposeParticle(particles.shift());
  }

  const color = charge > 0 ? PAL.cyan : PAL.red;

  // Core sphere
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 16, 10),
    new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 1.8,
      roughness: 0, metalness: 0,
    })
  );
  mesh.position.copy(position);
  scene.add(mesh);

  // Halo glow
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.14, 8, 6),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.18 })
  );
  mesh.add(glow);

  // Charge label sprite (+ or −)
  const sprCnv = document.createElement('canvas');
  sprCnv.width = sprCnv.height = 64;
  const sprCtx = sprCnv.getContext('2d');
  sprCtx.fillStyle = charge > 0 ? '#00ffcc' : '#ff3366';
  sprCtx.font = 'bold 48px monospace';
  sprCtx.textAlign = 'center'; sprCtx.textBaseline = 'middle';
  sprCtx.fillText(charge > 0 ? '+' : '−', 32, 32);
  const sprTex = new THREE.CanvasTexture(sprCnv);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: sprTex, transparent: true }));
  sprite.scale.set(0.2, 0.2, 0.2);
  sprite.position.y = 0.22;
  mesh.add(sprite);

  // Trail line
  const trailArr = new Float32Array(TRAIL_LEN * 3);
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailArr, 3));
  trailGeo.setDrawRange(0, 0);
  const trail = new THREE.Line(trailGeo,
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.4 })
  );
  scene.add(trail);

  // Force arrow (ArrowHelper)
  const fwdDir = velocity.clone().normalize();
  const forceArrow = new THREE.ArrowHelper(
    fwdDir, position, 0.7, PAL.amber, 0.18, 0.09
  );
  scene.add(forceArrow);

  particles.push({
    mesh, trail, trailGeo, forceArrow,
    position: position.clone(),
    velocity: velocity.clone(),
    charge, age: 0,
    history: [],
  });
}

function stepParticle(p, dt) {
  const B   = getB();
  const vxB = new THREE.Vector3().crossVectors(p.velocity, B);
  // a = q(v × B) / m
  vxB.multiplyScalar(p.charge * PARTICLE_CHARGE / PARTICLE_MASS);
  p.velocity.addScaledVector(vxB, dt);
  p.position.addScaledVector(p.velocity, dt);
  p.mesh.position.copy(p.position);
  p.age += dt;

  // Trail
  p.history.unshift(p.position.clone());
  if (p.history.length > TRAIL_LEN) p.history.pop();
  const arr = p.trailGeo.attributes.position.array;
  for (let i = 0; i < p.history.length; i++) {
    arr[i * 3]     = p.history[i].x;
    arr[i * 3 + 1] = p.history[i].y;
    arr[i * 3 + 2] = p.history[i].z;
  }
  p.trailGeo.attributes.position.needsUpdate = true;
  p.trailGeo.setDrawRange(0, p.history.length);

  // Force arrow
  const speed = p.velocity.length();
  if (speed > 0.05 && bMag > 0.05) {
    const rawForce = new THREE.Vector3().crossVectors(p.velocity, B);
    rawForce.multiplyScalar(p.charge);
    if (rawForce.length() > 0.01) {
      p.forceArrow.setDirection(rawForce.normalize());
      p.forceArrow.setLength(0.65, 0.18, 0.09);
      p.forceArrow.visible = true;
    }
    p.forceArrow.position.copy(p.position);
  } else {
    p.forceArrow.visible = false;
  }
}

function disposeParticle(p) {
  scene.remove(p.mesh);
  scene.remove(p.trail);
  scene.remove(p.forceArrow);
  p.mesh.geometry.dispose();
  p.trail.geometry.dispose();
}

// ════════════════════════════════════════════════
// VR CONTROLLERS
// ════════════════════════════════════════════════
const ctrl = [
  renderer.xr.getController(0), // right
  renderer.xr.getController(1), // left
];
ctrl.forEach(c => scene.add(c));

// Visual bodies
function makeCtrlBody(color) {
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.018, 0.025, 0.12, 8),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.35, roughness: 0.4 })
  );
  body.rotation.x = -Math.PI / 2;
  return body;
}

// Launcher barrel on right controller
function makeLauncher() {
  const g = new THREE.Group();

  const barrel = new THREE.Mesh(
    new THREE.CylinderGeometry(0.014, 0.018, 0.20, 8),
    new THREE.MeshStandardMaterial({ color: 0x1a2d3a, roughness: 0.25, metalness: 0.9 })
  );
  barrel.rotation.x = -Math.PI / 2;
  barrel.position.z = -0.10;

  // Muzzle ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.022, 0.004, 6, 12),
    new THREE.MeshStandardMaterial({ color: PAL.cyan, emissive: PAL.cyan, emissiveIntensity: 0.8 })
  );
  ring.position.z = -0.20;
  ring.rotation.x = Math.PI / 2;

  // Muzzle glow bead
  const bead = new THREE.Mesh(
    new THREE.SphereGeometry(0.015),
    new THREE.MeshBasicMaterial({ color: PAL.cyan })
  );
  bead.position.z = -0.22;

  g.add(barrel, ring, bead);
  return g;
}

ctrl[0].add(makeCtrlBody(PAL.cyan));
ctrl[0].add(makeLauncher());
ctrl[1].add(makeCtrlBody(PAL.amber));

// Controller velocity tracking
const ctrlPrev = [new THREE.Vector3(), new THREE.Vector3()];
const ctrlVel  = [new THREE.Vector3(), new THREE.Vector3()];

// ── Right trigger → fire ──
ctrl[0].addEventListener('selectstart', () => {
  const pos = new THREE.Vector3();
  ctrl[0].getWorldPosition(pos);
  // Launcher forward = controller −Z direction
  const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(ctrl[0].quaternion);
  const vel = fwd.multiplyScalar(LAUNCH_SPEED)
    .add(ctrlVel[0].clone().multiplyScalar(1.8));
  spawnParticle(pos, vel, chargeSign);
});

// ── Left trigger → cycle B direction ──
ctrl[1].addEventListener('selectstart', () => {
  bDirIdx = (bDirIdx + 1) % B_PRESETS.length;
  refreshArrows();
  updateUI();
});

// ── Right grip → B strength up ──
ctrl[0].addEventListener('squeezestart', () => {
  bMag = Math.min(bMag + 0.5, 5.0);
  refreshArrows();
  updateUI();
});

// ── Left grip → B strength down ──
ctrl[1].addEventListener('squeezestart', () => {
  bMag = Math.max(bMag - 0.5, 0.5);
  refreshArrows();
  updateUI();
});

// ── VR session lifecycle ──
renderer.xr.addEventListener('sessionstart', () => {
  makeVRHUD();
  document.getElementById('overlay').style.opacity = '0';
  document.getElementById('overlay').style.pointerEvents = 'none';
});
renderer.xr.addEventListener('sessionend', () => {
  removeVRHUD();
  document.getElementById('overlay').style.opacity = '1';
  document.getElementById('overlay').style.pointerEvents = 'none';
  // restore hint pointer events
  document.getElementById('vr-button').style.pointerEvents = 'all';
});

// ════════════════════════════════════════════════
// VR BUTTON
// ════════════════════════════════════════════════
const vrBtn = document.getElementById('vr-button');

(async () => {
  if (!('xr' in navigator)) {
    vrBtn.textContent = 'WEBXR NOT AVAILABLE'; vrBtn.disabled = true; return;
  }
  try {
    const ok = await navigator.xr.isSessionSupported('immersive-vr');
    if (!ok) { vrBtn.textContent = 'VR NOT SUPPORTED'; vrBtn.disabled = true; return; }
    vrBtn.textContent = 'ENTER VR';
    vrBtn.addEventListener('click', async () => {
      if (!xrSession) {
        xrSession = await navigator.xr.requestSession('immersive-vr', {
          optionalFeatures: ['local-floor', 'bounded-floor'],
        });
        await renderer.xr.setSession(xrSession);
        vrBtn.textContent = 'EXIT VR';
        xrSession.addEventListener('end', () => {
          xrSession = null;
          vrBtn.textContent = 'ENTER VR';
        });
      } else {
        xrSession.end();
      }
    });
  } catch (e) {
    vrBtn.textContent = 'VR ERROR'; vrBtn.disabled = true;
  }
})();

// ════════════════════════════════════════════════
// DESKTOP ORBIT CAMERA
// ════════════════════════════════════════════════
const orbit = { theta: 0, phi: 0.28, r: 7, drag: false, lx: 0, ly: 0 };

renderer.domElement.addEventListener('mousedown', e => {
  if (renderer.xr.isPresenting) return;
  orbit.drag = true; orbit.lx = e.clientX; orbit.ly = e.clientY;
});
window.addEventListener('mouseup', () => { orbit.drag = false; });
window.addEventListener('mousemove', e => {
  if (!orbit.drag || renderer.xr.isPresenting) return;
  orbit.theta -= (e.clientX - orbit.lx) * 0.007;
  orbit.phi   -= (e.clientY - orbit.ly) * 0.007;
  orbit.phi = Math.max(0.04, Math.min(Math.PI * 0.44, orbit.phi));
  orbit.lx = e.clientX; orbit.ly = e.clientY;
});
window.addEventListener('wheel', e => {
  if (renderer.xr.isPresenting) return;
  orbit.r = Math.max(2, Math.min(15, orbit.r + e.deltaY * 0.01));
});

window.addEventListener('keydown', e => {
  if (renderer.xr.isPresenting) return;
  switch (e.key) {
    case 'ArrowUp':
      bMag = Math.min(bMag + 0.5, 5); refreshArrows(); updateUI(); break;
    case 'ArrowDown':
      bMag = Math.max(bMag - 0.5, 0.5); refreshArrows(); updateUI(); break;
    case 'ArrowLeft':
    case 'ArrowRight':
      bDirIdx = (bDirIdx + 1) % B_PRESETS.length; refreshArrows(); updateUI(); break;
    case 'q': case 'Q':
      chargeSign = -chargeSign; updateUI(); break;
    case ' ':
      e.preventDefault(); fireDesktop(); break;
  }
});

renderer.domElement.addEventListener('click', e => {
  if (renderer.xr.isPresenting || e.target.id === 'vr-button') return;
  fireDesktop();
});

function fireDesktop() {
  const pos = camera.position.clone().add(
    new THREE.Vector3(0, 0, -0.5).applyQuaternion(camera.quaternion)
  );
  const vel = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).multiplyScalar(LAUNCH_SPEED);
  spawnParticle(pos, vel, chargeSign);
}

// ════════════════════════════════════════════════
// DESKTOP UI UPDATE
// ════════════════════════════════════════════════
function updateUI() {
  document.getElementById('b-val').textContent  = bMag.toFixed(1) + ' T';
  document.getElementById('b-dir').textContent  = B_PRESETS[bDirIdx].label;
  document.getElementById('q-val').textContent  = `${chargeSign > 0 ? '+' : '−'}1 e`;

  const badge = document.getElementById('charge-badge');
  badge.textContent = chargeSign > 0 ? '+' : '−';
  if (chargeSign > 0) badge.classList.remove('neg');
  else badge.classList.add('neg');
}
updateUI();

// ════════════════════════════════════════════════
// ANIMATION LOOP
// ════════════════════════════════════════════════
renderer.setAnimationLoop((time) => {
  const dt = Math.min((time - lastTime) / 1000, 0.033);
  lastTime = time;

  // Track controller velocities
  if (renderer.xr.isPresenting) {
    for (let i = 0; i < 2; i++) {
      const curr = new THREE.Vector3();
      ctrl[i].getWorldPosition(curr);
      if (dt > 0.001) ctrlVel[i].subVectors(curr, ctrlPrev[i]).divideScalar(dt);
      ctrlPrev[i].copy(curr);
    }
  }

  // Particle physics
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    stepParticle(p, dt);
    if (p.position.length() > 28 || p.age > PARTICLE_LIFE) {
      disposeParticle(p);
      particles.splice(i, 1);
    }
  }

  // Desktop camera orbit
  if (!renderer.xr.isPresenting) {
    camera.position.set(
      orbit.r * Math.sin(orbit.theta) * Math.cos(orbit.phi),
      orbit.r * Math.sin(orbit.phi) + 1.2,
      orbit.r * Math.cos(orbit.theta) * Math.cos(orbit.phi)
    );
    camera.lookAt(0, 1.5, 0);

    // Desktop readouts
    document.getElementById('p-count').textContent = particles.length;
    if (particles.length > 0) {
      const p   = particles[particles.length - 1];
      const spd = p.velocity.length();
      const r   = bMag > 0.01 ? (PARTICLE_MASS * spd / (PARTICLE_CHARGE * bMag)).toFixed(2) + ' m' : '—';
      const T   = bMag > 0.01 ? (2 * Math.PI * PARTICLE_MASS / (PARTICLE_CHARGE * bMag)).toFixed(2) + ' s' : '—';
      document.getElementById('v-val').textContent = spd.toFixed(2) + ' m/s';
      document.getElementById('r-val').textContent = r;
      document.getElementById('T-val').textContent = T;
    } else {
      ['v-val','r-val','T-val'].forEach(id => document.getElementById(id).textContent = '—');
    }
  }

  // VR HUD
  if (renderer.xr.isPresenting) drawVRHUD();

  renderer.render(scene, camera);
});

// ════════════════════════════════════════════════
// RESIZE
// ════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
